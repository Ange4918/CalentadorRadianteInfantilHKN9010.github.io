<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Resultados</title>

<style>

body{
font-family:Arial;
background:#eef3f8;
margin:0;
}

.container{
padding:20px;
}

.card{
background:white;
padding:20px;
margin-bottom:20px;
border-radius:15px;
}

.score{
font-size:40px;
font-weight:bold;
color:#2563eb;
}

.estado{
padding:10px;
border-radius:10px;
margin:10px 0;
}

.correcto{
background:#dcfce7;
border-left:5px solid #16a34a;
}

.parcial{
background:#fef9c3;
border-left:5px solid #ca8a04;
}

.incorrecto{
background:#fee2e2;
border-left:5px solid #dc2626;
}

.categoria{
background:#dbeafe;
padding:12px;
border-radius:10px;
margin-top:20px;
font-weight:bold;
color:#1d4ed8;
}

.btn{
padding:12px 20px;
margin-right:10px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:bold;
}

.nueva{
background:#2563eb;
color:white;
}

.inicio{
background:#64748b;
color:white;
}

</style>
</head>

<body>

<div class="container">

<!-- RESULTADO -->
<div class="card">

<h2>Resultados de la evaluación clínica</h2>

<div class="score" id="score"></div>

<p id="detalle"></p>

<p id="feedback"></p>

</div>

<!-- REVISIÓN -->
<div class="card">

<h3>Revisión del desempeño clínico</h3>

<div id="revision"></div>

</div>

<div class="card">

<h3>Revisión del desempeño técnico</h3>

<div id="tecnico"></div>

</div>

<!-- BOTONES -->
<button class="btn nueva"
onclick="window.location.href='simulacion.html'">

Nueva simulación

</button>

<button class="btn inicio"
onclick="window.location.href='index.html'">

Inicio

</button>

</div>

<script>

// 🔹 DATOS
let score = localStorage.getItem("score");
let correctas = localStorage.getItem("correctas");
let total = localStorage.getItem("total");

// 🔹 SCORE
document.getElementById("score").innerText =
score + "/100";

document.getElementById("detalle").innerText =
correctas + " puntos obtenidos de "
+ total + " criterios evaluados";

// 🔹 FEEDBACK
let feedback = "";

if(score >= 90){

feedback =
"Excelente desempeño. Demuestra comprensión profunda del protocolo de termorregulación neonatal y correcta ejecución clínica.";

}
else if(score >= 70){

feedback =
"Buen desempeño. Comprende adecuadamente el protocolo clínico, aunque existen aspectos que pueden mejorarse.";

}
else if(score >= 50){

feedback =
"Desempeño aceptable, pero requiere mayor práctica en la secuencia y ejecución del protocolo.";

}
else{

feedback =
"Se recomienda reforzar el conocimiento y práctica del protocolo clínico antes de continuar.";

}

document.getElementById("feedback").innerText =
feedback;

// 🔹 REVISIÓN
let datos =
JSON.parse(localStorage.getItem("revision"));

let html = "";
let categoriaActual = "";

datos.forEach((r)=>{

if(r.categoria !== categoriaActual){

categoriaActual = r.categoria;

html += `
<div class="categoria">
${categoriaActual}
</div>
`;

}

let clase = "";

if(r.estado === "Correcto"){
clase = "correcto";
}

else if(r.estado === "Parcialmente correcto"){
clase = "parcial";
}

else{
clase = "incorrecto";
}

html += `
<div class="estado ${clase}">

<b>${r.item}</b>
<br><br>

Resultado:
<b>${r.estado}</b>

</div>
`;

});

document.getElementById("revision").innerHTML =
html;

// =====================================================
// REVISION TECNICA
// =====================================================

let acciones =
JSON.parse(
localStorage.getItem("accionesTecnicas")
) || [];

let tecnicoHTML = "";

function agregarTecnico(texto,estado){

let clase = "";

if(estado == "ok"){

clase = "correcto";
}

else if(estado == "warn"){

clase = "parcial";
}

else{

clase = "incorrecto";
}

tecnicoHTML += `

<div class="estado ${clase}">

${texto}

</div>

`;
}

// =================================================
// ANALISIS
// =================================================

// MANUAL

if(acciones.includes("manual")){

agregarTecnico(
"✔ Cambio a modo MANUAL detectado",
"ok"
);
}

else{

agregarTecnico(
"✖ Nunca se utilizó modo MANUAL",
"bad"
);
}

// AJUSTES

if(
acciones.includes("aumento") ||
acciones.includes("disminucion")
){

agregarTecnico(
"✔ Ajuste de potencia detectado",
"ok"
);
}

else{

agregarTecnico(
"✖ No se realizaron ajustes térmicos",
"bad"
);
}

// MODO BEBE

if(acciones.includes("bebe")){

agregarTecnico(
"✔ Cambio a modo BEBÉ detectado",
"ok"
);
}

// APGAR

if(acciones.includes("apgar")){

agregarTecnico(
"✔ Temporizador APGAR utilizado",
"ok"
);
}

// TIMER

if(acciones.includes("timer")){

agregarTecnico(
"✔ Temporizador clínico utilizado",
"ok"
);
}

// BLOQUEO

if(acciones.includes("bloqueo")){

agregarTecnico(
"✔ Bloqueo de teclado utilizado",
"ok"
);
}

// SILENCIO

if(acciones.includes("silencio")){

agregarTecnico(
"✔ Función silencio utilizada",
"ok"
);
}

// CANCELAR

if(acciones.includes("cancelar")){

agregarTecnico(
"✔ Cancelación de proceso detectada",
"warn"
);
}

document.getElementById("tecnico").innerHTML =
tecnicoHTML;

</script>

</body>
</html>
